<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印刷廠校稿系統</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1a1a1a;--gray:#666;--lgray:#f4f4f4;--border:#e0e0e0;--white:#fff;
  --green:#2d7d46;--green-l:#ebf7ef;
  --orange:#c05c0a;--orange-l:#fff3e9;
  --red:#b91c1c;--red-l:#fef2f2;
  --blue:#1d5fa8;--blue-l:#eaf2fd;
}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#f8f8f8;color:var(--black);font-size:14px;line-height:1.5}
.wrap{max-width:800px;margin:0 auto;padding:2rem 1rem 4rem}
header{display:flex;align-items:center;gap:12px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.logo{width:36px;height:36px;background:var(--black);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
header h1{font-size:17px;font-weight:600}
header p{font-size:12px;color:var(--gray);margin-top:2px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
label{font-size:12px;color:var(--gray);display:block;margin-bottom:4px}
select,input[type=number]{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;color:var(--black)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* 上傳區 */
.drop{border:1.5px dashed var(--border);border-radius:8px;padding:2rem;text-align:center;cursor:pointer;transition:background .15s;position:relative;background:#fff}
.drop:hover,.drop.over{background:var(--lgray);border-color:#aaa}
.drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:2rem;margin-bottom:8px}
.drop-label{font-weight:500;font-size:14px}
.drop-sub{font-size:12px;color:var(--gray);margin-top:4px}
.file-badge{display:inline-flex;align-items:center;gap:6px;background:var(--lgray);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;margin-top:10px}
.file-badge .rm{cursor:pointer;color:var(--gray);margin-left:4px;font-size:14px}

/* 模式切換 */
.mode-row{display:flex;gap:8px;margin-bottom:1rem}
.mode-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:13px;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--black);color:#fff;border-color:var(--black)}
.mode-hint{font-size:11px;color:var(--gray);margin-top:-8px;margin-bottom:12px;padding:0 2px}

/* 執行按鈕 */
.run-btn{width:100%;padding:11px;font-size:14px;font-weight:600;background:var(--black);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;margin-top:4px}
.run-btn:hover{opacity:.85}
.run-btn:disabled{opacity:.4;cursor:not-allowed}

/* 進度條 */
.prog-wrap{margin-top:12px;display:none}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:5px}
.prog-bar-bg{height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;width:0;background:var(--black);border-radius:4px;transition:width .4s ease}

/* 佇列面板 */
.queue-panel{display:none}
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:#fff}
.qi-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}
.qi-status{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.qi-queued{background:var(--lgray);color:var(--gray)}
.qi-processing{background:var(--blue-l);color:var(--blue)}
.qi-success{background:var(--green-l);color:var(--green)}
.qi-failed{background:var(--red-l);color:var(--red)}
.qi-prog{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;min-width:80px;max-width:120px}
.qi-prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.qi-link{font-size:12px;color:var(--blue);text-decoration:none;white-space:nowrap}
.qi-link:hover{text-decoration:underline}

/* 結果區 */
#resultSection{display:none}
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.sum-card{border-radius:8px;padding:1rem;text-align:center}
.sum-card .num{font-size:24px;font-weight:600}
.sum-card .lbl{font-size:11px;margin-top:3px}
.s-pass{background:var(--green-l);color:var(--green)}
.s-warn{background:var(--orange-l);color:var(--orange)}
.s-fail{background:var(--red-l);color:var(--red)}
.s-total{background:var(--lgray);color:var(--gray)}
.banner{border-radius:8px;padding:12px 16px;font-weight:600;font-size:14px;margin-bottom:1.25rem;border-left:4px solid}
.b-pass{background:var(--green-l);color:var(--green);border-color:var(--green)}
.b-warn{background:var(--orange-l);color:var(--orange);border-color:var(--orange)}
.b-fail{background:var(--red-l);color:var(--red);border-color:var(--red)}
.b-error{background:var(--lgray);color:var(--gray);border-color:var(--gray)}
.result-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.result-hd span{font-weight:600;font-size:14px}
.dl-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:#fff;border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;text-decoration:none;color:var(--black)}
.dl-btn:hover{background:var(--lgray)}

/* 模組卡 */
.mod-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px}
.mod-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:#fff;user-select:none}
.mod-hd:hover{background:var(--lgray)}
.mod-name{flex:1;font-weight:500;font-size:13px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.p-pass{background:var(--green-l);color:var(--green)}
.p-warn{background:var(--orange-l);color:var(--orange)}
.p-fail{background:var(--red-l);color:var(--red)}
.p-error{background:var(--lgray);color:var(--gray)}
.fmt-badge{display:inline-flex;align-items:center;gap:6px;background:var(--lgray);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--gray);margin-bottom:.75rem}
.chev{font-size:11px;color:var(--gray);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.mod-body{display:none;border-top:1px solid var(--border)}
.mod-body.open{display:block}
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{background:var(--black);color:#fff;padding:6px 10px;text-align:left;font-weight:500}
.dt td{padding:6px 10px;border-bottom:1px solid var(--border)}
.dt tr:last-child td{border-bottom:none}
.dt tr:nth-child(even) td{background:var(--lgray)}
.vp{color:var(--green);font-weight:600}
.vw{color:var(--orange);font-weight:600}
.vf{color:var(--red);font-weight:600}
.vnote{color:var(--gray);font-style:italic}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">✓</div>
    <div>
      <h1>印刷廠校稿系統</h1>
      <p>Prepress Preflight Checker v2.1 — PDF / Adobe Illustrator(.ai) · 同步 / 非同步雙模式</p>
    </div>
  </header>

  <!-- 上傳卡 -->
  <div class="card">
    <div class="card-title">上傳稿件</div>
    <div class="drop" id="dropZone">
      <input type="file" accept=".pdf,.ai" multiple id="fileInput" onchange="handleFiles(event)">
      <div class="drop-icon">📄</div>
      <div class="drop-label">上傳 PDF / AI 稿件</div>
      <div class="drop-sub">點擊選擇或拖曳檔案 · 支援 .pdf / .ai · 可多選批次上傳</div>
    </div>
    <div id="fileBadges" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;"></div>
  </div>

  <!-- 規格卡 -->
  <div class="card">
    <div class="card-title">檢查規格</div>
    <div class="g3">
      <div>
        <label>成品規格</label>
        <select id="specName" onchange="toggleCustom()">
          <option value="A4">A4 — 210 × 297 mm</option>
          <option value="A5">A5 — 148 × 210 mm</option>
          <option value="A3">A3 — 297 × 420 mm</option>
          <option value="名片">名片 — 90 × 55 mm</option>
          <option value="DL信封">DL 信封 — 210 × 99 mm</option>
          <option value="自訂">自訂尺寸</option>
        </select>
      </div>
      <div>
        <label>要求出血 (mm)</label>
        <select id="bleedMm">
          <option value="3">3 mm（標準）</option>
          <option value="5">5 mm（大版）</option>
          <option value="0">0 mm（無出血）</option>
        </select>
      </div>
      <div>
        <label>最低解析度</label>
        <select id="minDpi">
          <option value="300">300 DPI</option>
          <option value="150">150 DPI（看板）</option>
          <option value="600">600 DPI（精細）</option>
          <option value="1200">1200 DPI（線稿）</option>
        </select>
      </div>
    </div>
    <div id="customSize" style="display:none;margin-top:12px;" class="g2">
      <div><label>自訂寬度 (mm)</label><input type="number" id="specW" value="210" min="10" max="2000"></div>
      <div><label>自訂高度 (mm)</label><input type="number" id="specH" value="297" min="10" max="2000"></div>
    </div>
  </div>

  <!-- 模式選擇 -->
  <div class="card">
    <div class="card-title">處理模式</div>
    <div class="mode-row">
      <button class="mode-btn active" id="modeSync" onclick="setMode('sync')">⚡ 同步（即時）</button>
      <button class="mode-btn" id="modeAsync" onclick="setMode('async')">🔄 非同步（批次佇列）</button>
    </div>
    <p class="mode-hint" id="modeHint">上傳後立即執行並等待結果，適合單份小檔（&lt; 20 MB）。</p>
    <button class="run-btn" id="runBtn" onclick="runAll()">開始校稿</button>
    <div class="prog-wrap" id="progWrap">
      <div class="prog-label"><span id="progStage">準備中...</span><span id="progPct">0%</span></div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" id="progFill"></div></div>
    </div>
  </div>

  <!-- 佇列面板（非同步模式） -->
  <div class="queue-panel card" id="queuePanel">
    <div class="card-title">佇列狀態</div>
    <div id="queueList"></div>
  </div>

  <!-- 結果區（同步模式） -->
  <div id="resultSection">
    <span id="fmtBadge" class="fmt-badge" style="display:none"></span>
    <div class="sum-row" id="sumRow"></div>
    <div id="overallBanner" class="banner"></div>
    <div class="result-hd">
      <span>詳細檢查結果</span>
      <a id="dlBtn" class="dl-btn" href="#" target="_blank" style="display:none">📥 下載 PDF 報告</a>
    </div>
    <div id="modList"></div>
  </div>
</div>

<script>
const API = '';
let files = [];
let mode  = 'sync';
let pollTimers = {};

// ── 檔案處理 ─────────────────────────────────────────
function handleFiles(e) {
  addFiles(Array.from(e.target.files));
}
function addFiles(newFiles) {
  newFiles.forEach(f => { if (!files.find(x=>x.name===f.name)) files.push(f); });
  renderBadges();
  document.getElementById('resultSection').style.display = 'none';
}
function removeFile(name) {
  files = files.filter(f => f.name !== name);
  renderBadges();
}
function renderBadges() {
  const el = document.getElementById('fileBadges');
  el.innerHTML = files.map(f =>
    `<span class="file-badge">📎 ${f.name} <span class="rm" onclick="removeFile('${f.name}')">✕</span></span>`
  ).join('');
}

// 拖曳
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave',() => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  addFiles(Array.from(e.dataTransfer.files).filter(f => /\.(pdf|ai)$/i.test(f.name)));
});

// ── 模式切換 ─────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('modeSync').classList.toggle('active', m==='sync');
  document.getElementById('modeAsync').classList.toggle('active', m==='async');
  const hints = {
    sync:  '上傳後立即執行並等待結果，適合單份小檔（< 20 MB）。',
    async: '立即送入佇列，背景 worker 處理，適合大檔或多份批次上傳，頁面可繼續操作。',
  };
  document.getElementById('modeHint').textContent = hints[m];
  document.getElementById('queuePanel').style.display = m==='async' ? 'block' : 'none';
  document.getElementById('resultSection').style.display = 'none';
}

function toggleCustom() {
  document.getElementById('customSize').style.display =
    document.getElementById('specName').value === '自訂' ? 'grid' : 'none';
}

// ── 主執行 ────────────────────────────────────────────
async function runAll() {
  if (!files.length) { alert('請先選擇 PDF 或 AI 檔案'); return; }
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  if (mode === 'sync') {
    await runSync(files[0]);
  } else {
    await runBatch(files);
  }
  btn.disabled = false;
}

// ── 同步模式 ──────────────────────────────────────────
async function runSync(file) {
  setProgress(true, 10, '上傳中...');
  const form = buildForm(file);
  try {
    const res = await fetch(API + '/preflight', { method:'POST', body: form });
    setProgress(true, 80, '分析中...');
    if (!res.ok) { const e=await res.json(); throw new Error(e.detail||'伺服器錯誤'); }
    const data = await res.json();
    setProgress(true, 100, '完成');
    setTimeout(() => setProgress(false), 600);
    renderResult(data);
  } catch(err) {
    setProgress(false);
    alert('校稿失敗：' + err.message);
  }
}

// ── 非同步批次模式 ────────────────────────────────────
async function runBatch(fileList) {
  setProgress(false);
  document.getElementById('queuePanel').style.display = 'block';
  for (const file of fileList) {
    await enqueue(file);
  }
}

async function enqueue(file) {
  const form = buildForm(file, true);
  try {
    const res  = await fetch(API + '/preflight/async', { method:'POST', body: form });
    if (!res.ok) throw new Error((await res.json()).detail || '排隊失敗');
    const data = await res.json();
    addQueueItem(data.job_id, file.name);
    pollJob(data.job_id);
  } catch(err) {
    alert(`${file.name} 排隊失敗：${err.message}`);
  }
}

function buildForm(file, isAsync=false) {
  const form = new FormData();
  form.append('file',      file);
  form.append('spec_name', document.getElementById('specName').value);
  form.append('bleed_mm',  document.getElementById('bleedMm').value);
  form.append('min_dpi',   document.getElementById('minDpi').value);
  form.append('gen_report','true');
  if (document.getElementById('specName').value === '自訂') {
    form.append('spec_width',  document.getElementById('specW').value);
    form.append('spec_height', document.getElementById('specH').value);
  }
  return form;
}

// ── 佇列 UI ───────────────────────────────────────────
let queueItems = {};

function addQueueItem(jobId, filename) {
  queueItems[jobId] = { filename, status:'queued', progress:0 };
  renderQueueList();
}

function renderQueueList() {
  const list = document.getElementById('queueList');
  if (!Object.keys(queueItems).length) { list.innerHTML='<p style="color:var(--gray);font-size:13px">尚無工作</p>'; return; }
  list.innerHTML = Object.entries(queueItems).reverse().map(([id, qi]) => {
    const sc = { queued:'qi-queued', processing:'qi-processing', success:'qi-success', failed:'qi-failed' }[qi.status] || 'qi-queued';
    const sl = { queued:'排隊中', processing:'處理中', success:'完成', failed:'失敗' }[qi.status] || qi.status;
    const pct = qi.progress || 0;
    const reportLink = qi.reportUrl
      ? `<a class="qi-link" href="${qi.reportUrl}" target="_blank">下載報告</a>` : '';
    const viewLink = qi.result
      ? `<button class="qi-link" style="background:none;border:none;cursor:pointer;" onclick='showResult(${JSON.stringify(id)})'>查看結果</button>` : '';
    return `<div class="queue-item" id="qi-${id}">
      <span style="font-size:15px">${qi.status==='success'?'✅':qi.status==='failed'?'❌':qi.status==='processing'?'🔄':'🕐'}</span>
      <span class="qi-name" title="${qi.filename}">${qi.filename}</span>
      <div class="qi-prog"><div class="qi-prog-fill" style="width:${pct}%"></div></div>
      <span class="qi-status ${sc}">${sl}</span>
      ${reportLink}${viewLink}
    </div>`;
  }).join('');
}

// ── 輪詢 ──────────────────────────────────────────────
function pollJob(jobId) {
  if (pollTimers[jobId]) clearInterval(pollTimers[jobId]);
  pollTimers[jobId] = setInterval(async () => {
    try {
      const res = await fetch(`${API}/jobs/${jobId}`);
      const data = await res.json();
      const qi   = queueItems[jobId];
      if (!qi) return;
      qi.progress = data.progress || 0;
      if (data.stage) qi.stage = data.stage;
      if (data.status === 'success') {
        qi.status    = 'success';
        qi.progress  = 100;
        qi.result    = data;
        qi.reportUrl = data.report_url || null;
        clearInterval(pollTimers[jobId]);
      } else if (data.status === 'failed') {
        qi.status = 'failed';
        clearInterval(pollTimers[jobId]);
      } else {
        qi.status = 'processing';
      }
      renderQueueList();
    } catch(e) { /* 網路中斷，下次繼續 */ }
  }, 1500);  // 每 1.5 秒輪詢一次
}

function showResult(jobId) {
  const qi = queueItems[jobId];
  if (qi && qi.result) renderResult(qi.result);
}

// ── 結果渲染 ──────────────────────────────────────────
function icon(s)  { return s==='pass'?'✓':s==='warn'?'!':s==='error'?'💥':'✗'; }
function label(s) { return s==='pass'?'通過':s==='warn'?'警告':s==='error'?'錯誤':'退稿'; }
function vc(s)    { return s==='pass'?'vp':s==='warn'?'vw':s==='error'?'vf':'vf'; }
function pc(s)    { return s==='pass'?'p-pass':s==='warn'?'p-warn':s==='error'?'p-error':'p-fail'; }

function renderResult(data) {
  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.scrollIntoView({ behavior:'smooth', block:'start' });

  const c = { pass:0, warn:0, fail:0 };
  data.results.forEach(r => c[r.status] = (c[r.status]||0)+1);

  document.getElementById('sumRow').innerHTML =
    `<div class="sum-card s-pass"><div class="num">${c.pass||0}</div><div class="lbl">項通過</div></div>
     <div class="sum-card s-warn"><div class="num">${c.warn||0}</div><div class="lbl">項警告</div></div>
     <div class="sum-card s-fail"><div class="num">${c.fail||0}</div><div class="lbl">項退稿</div></div>
     <div class="sum-card s-total"><div class="num">${data.results.length}</div><div class="lbl">項總計</div></div>`;

  const oi = { pass:'✅', warn:'⚠️', fail:'❌', error:'💥' };
  const ol = { pass:'通過 — 稿件符合印刷規格', warn:'需確認 — 部分項目需業務審核',
                fail:'退稿 — 稿件不符規格，請修改後重新上傳',
                error:'無法處理 — 檔案格式錯誤，請參考下方說明' };
  const ob = document.getElementById('overallBanner');
  ob.className = `banner b-${data.overall}`;
  ob.textContent = `${oi[data.overall]}  整體結論：${ol[data.overall]}`;

  // 檔案格式標籤
  const fmtBadge = document.getElementById('fmtBadge');
  if (fmtBadge) {
    if (data.file_format) {
      fmtBadge.style.display = 'inline-flex';
      fmtBadge.textContent = `📄 檔案格式：${data.file_format}`;
    } else {
      fmtBadge.style.display = 'none';
    }
  }

  const dl = document.getElementById('dlBtn');
  dl.style.display = data.report_url ? 'inline-flex' : 'none';
  dl.href = data.report_url || '#';

  document.getElementById('modList').innerHTML = data.results.map((r,i)=>`
    <div class="mod-card">
      <div class="mod-hd" onclick="tog(${i})">
        <span style="font-size:14px">${icon(r.status)}</span>
        <span class="mod-name">${r.module}</span>
        <span class="pill ${pc(r.status)}">${label(r.status)}</span>
        <span class="chev" id="chev-${i}">▾</span>
      </div>
      <div class="mod-body" id="body-${i}">
        ${r.items && r.items.length ? `
        <table class="dt">
          <thead><tr><th>檢查項目</th><th>結果</th><th>狀態</th><th>說明</th></tr></thead>
          <tbody>${r.items.map(it=>`
            <tr>
              <td>${it.key}</td>
              <td>${it.value}</td>
              <td class="${vc(it.status)}">${icon(it.status)} ${label(it.status)}</td>
              <td class="vnote">${it.note||'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : `
        <div style="padding:14px; font-size:13px; color:var(--gray); line-height:1.7;">${(r.message||'').replace(/\\n/g,'<br>')}</div>`}
      </div>
    </div>`).join('');
}

function tog(i) {
  document.getElementById('body-'+i).classList.toggle('open');
  document.getElementById('chev-'+i).classList.toggle('open');
}

// ── 進度條 ────────────────────────────────────────────
function setProgress(show, pct=0, stage='') {
  const wrap = document.getElementById('progWrap');
  wrap.style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progStage').textContent = stage;
    document.getElementById('progPct').textContent   = pct + '%';
  }
}
</script>
</body>
</html>
